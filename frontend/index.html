<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Premium E-Commerce</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            900: '#4c1d95',
                        }
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s ease-out forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Glassmorphism Utilities */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .product-card {
            opacity: 0;
            /* Start hidden for animation */
        }

        /* Subtle glowing text */
        .text-glow {
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }
    </style>
</head>

<body
    class="bg-gray-900 text-gray-100 min-h-screen font-sans antialiased selection:bg-brand-500 selection:text-white relative overflow-x-hidden">

    <!-- Background Gradients -->
    <div
        class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-brand-600 rounded-full mix-blend-multiply filter blur-[120px] opacity-40 animate-pulse pointer-events-none">
    </div>
    <div
        class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-600 rounded-full mix-blend-multiply filter blur-[120px] opacity-30 pointer-events-none">
    </div>

    <!-- Navigation -->
    <nav class="glass-card sticky top-0 z-50 px-6 py-4 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center space-x-2 cursor-pointer">
            <div
                class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center shadow-lg shadow-brand-500/30">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
            <span class="text-xl font-bold tracking-tight text-white">Lumina</span>
        </div>
        <div class="flex gap-4">
            <button class="text-sm font-medium text-gray-300 hover:text-white transition">Catalog</button>
            <button class="text-sm font-medium text-gray-300 hover:text-white transition">About</button>
        </div>
    </nav>

    <!-- Main Section -->
    <main class="container mx-auto px-4 py-16 max-w-6xl relative z-10">

        <!-- Header -->
        <header class="text-center mb-16 animate-fade-in-up">
            <span
                class="inline-block py-1 px-3 rounded-full glass-card text-brand-400 text-xs font-semibold tracking-wider uppercase mb-4 shadow-sm">Fall
                Collection</span>
            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-6 text-glow">
                Next-Gen <br />
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-400 to-blue-400">Audio
                    Devices</span>
            </h1>
            <p class="text-lg text-gray-400 max-w-2xl mx-auto font-light">
                Discover our meticulously engineered sound systems designed to elevate your auditory experience to
                stunning new heights.
            </p>
        </header>

        <!-- Product Grid -->
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Products injected by app.js -->
        </div>

    </main>

    <!-- Footer -->
    <footer class="mt-20 border-t border-white/10 py-8 text-center text-gray-500 text-sm relative z-10">
        <p>&copy; 2026 Lumina E-Commerce. Built for CI/CD learning.</p>
    </footer>

    <script src="app.js"></script>
</body>

</html>
